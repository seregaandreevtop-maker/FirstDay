<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FirstDay — Трекер воздержания</title>
  <style>
    :root {
      --bg: #08090d;
      --panel: #12141b;
      --text: #f2f4f8;
      --muted: #9ca3b3;
      --accent: #86efac;
      --danger: #ef4444;
      --line: #2a2f3a;
      --glow: rgba(134, 239, 172, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #171a24 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      border: 1px solid var(--line);
      background: linear-gradient(165deg, rgba(18,20,27,.95), rgba(8,9,13,.95));
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .header {
      padding: 28px;
      border-bottom: 1px solid var(--line);
    }

    h1 { margin: 0 0 6px; font-size: clamp(24px, 5vw, 36px); }
    .subtitle { margin: 0; color: var(--muted); }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      padding: 22px;
    }

    @media (min-width: 860px) {
      .grid { grid-template-columns: 360px 1fr; }
    }

    .card {
      background: rgba(15, 17, 24, 0.92);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 12px;
      font-size: 15px;
      background: #0f1118;
      color: var(--text);
      margin-bottom: 12px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    button {
      cursor: pointer;
      font-weight: 600;
      transition: .2s ease;
    }

    .btn-primary {
      background: linear-gradient(180deg, #183324, #101e16);
      border-color: #254733;
      color: #d7ffe8;
    }

    .btn-primary:hover { transform: translateY(-1px); }

    .btn-danger {
      background: linear-gradient(180deg, #39191d, #231114);
      border-color: #5c262d;
      color: #ffdadd;
      margin-bottom: 0;
    }

    .counter {
      display: grid;
      grid-template-columns: repeat(5, minmax(72px, 1fr));
      gap: 10px;
      margin: 14px 0 18px;
    }

    .unit {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      background: #0c0f15;
    }

    .value { font-size: clamp(20px, 4vw, 30px); font-weight: 700; }
    .name { font-size: 12px; color: var(--muted); text-transform: uppercase; }

    .message {
      border: 1px dashed #2f4836;
      border-radius: 12px;
      padding: 12px;
      background: rgba(44, 78, 53, 0.14);
      margin-bottom: 10px;
    }

    .quote {
      color: #d9ffe8;
      font-style: italic;
      margin: 0;
    }

    .muted { color: var(--muted); font-size: 14px; margin: 4px 0; }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>FirstDay</h1>
      <p class="subtitle">Твой строгий, но поддерживающий трекер новой жизни.</p>
    </header>

    <section class="grid">
      <div class="card">
        <label for="name">Имя</label>
        <input id="name" type="text" placeholder="Например: Алексей" />

        <label for="birthDate">Дата рождения</label>
        <input id="birthDate" type="date" />

        <label for="habit">С чем завязал(а)</label>
        <select id="habit">
          <option>Алкоголь</option>
          <option>Табак</option>
          <option>Наркотики</option>
          <option>Мастурбация</option>
          <option>Переедание</option>
          <option>Ссоры с близкими</option>
        </select>

        <label for="startDate">Дата начала воздержания</label>
        <input id="startDate" type="datetime-local" />

        <label for="apiKey">Kie.ai API ключ (для Gemini)</label>
        <input id="apiKey" type="password" placeholder="Вставь ключ, например b0b6..." />

        <button id="testAiBtn" type="button">Проверить подключение Gemini</button>

        <button id="saveBtn" class="btn-primary">Запустить трекер</button>
        <button id="resetBtn" class="btn-danger">Сбросить результат</button>
      </div>

      <div class="card">
        <p id="greeting" class="muted">Заполни форму и запусти свой первый день.</p>

        <div class="counter">
          <div class="unit"><div id="years" class="value">0</div><div class="name">Лет</div></div>
          <div class="unit"><div id="days" class="value">0</div><div class="name">Дней</div></div>
          <div class="unit"><div id="hours" class="value">0</div><div class="name">Часов</div></div>
          <div class="unit"><div id="minutes" class="value">0</div><div class="name">Минут</div></div>
          <div class="unit"><div id="seconds" class="value">0</div><div class="name">Секунд</div></div>
        </div>

        <div class="message">
          <p class="muted" id="dailyMsg">Каждый день без срыва — вклад в твоё будущее.</p>
          <p class="quote" id="quote">«Сегодня ты сильнее, чем вчера.»</p>
        </div>

        <p class="muted" id="lifeDays">Ты живёшь: —</p>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'firstday_tracker_v1';

    const quoteBank = {
      'Алкоголь': ['Свобода начинается там, где заканчивается зависимость.', 'Трезвость — это ясность, сила и уважение к себе.'],
      'Табак': ['Каждый день без дыма — подарок твоим лёгким.', 'Ты выбираешь воздух, а не пепел.'],
      'Наркотики': ['Твоё будущее сильнее любой тяги.', 'Ты возвращаешь себе жизнь шаг за шагом.'],
      'Мастурбация': ['Самоконтроль — это зрелость и сила характера.', 'Дисциплина сегодня — уверенность завтра.'],
      'Переедание': ['Ты ешь для жизни, а не живёшь для еды.', 'Умеренность — форма уважения к своему телу.'],
      'Ссоры с близкими': ['Мир в семье начинается с твоей выдержки.', 'Спокойствие — это тоже мужество.']
    };

    const fields = {
      name: document.getElementById('name'),
      birthDate: document.getElementById('birthDate'),
      habit: document.getElementById('habit'),
      startDate: document.getElementById('startDate'),
      apiKey: document.getElementById('apiKey')
    };

    const AI_KEY_STORAGE = 'firstday_kie_api_key_v1';

    const ui = {
      years: document.getElementById('years'),
      days: document.getElementById('days'),
      hours: document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds'),
      greeting: document.getElementById('greeting'),
      dailyMsg: document.getElementById('dailyMsg'),
      quote: document.getElementById('quote'),
      lifeDays: document.getElementById('lifeDays')
    };

    let timerId = null;

    const getSaved = () => JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    const saveData = (data) => localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

    function setDefaultStartDate() {
      if (!fields.startDate.value) {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        fields.startDate.value = now.toISOString().slice(0,16);
      }
    }

    function getRandomQuote(habit) {
      const list = quoteBank[habit] || ['Ты двигаешься в верном направлении.'];
      return list[Math.floor(Math.random() * list.length)];
    }

    function splitDiff(start, now) {
      let s = new Date(start);
      let y = 0;
      while (new Date(s.getFullYear() + 1, s.getMonth(), s.getDate(), s.getHours(), s.getMinutes(), s.getSeconds()) <= now) {
        s = new Date(s.getFullYear() + 1, s.getMonth(), s.getDate(), s.getHours(), s.getMinutes(), s.getSeconds());
        y++;
      }
      const totalMs = now - s;
      const totalSec = Math.max(0, Math.floor(totalMs / 1000));
      const d = Math.floor(totalSec / 86400);
      const h = Math.floor((totalSec % 86400) / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const sec = totalSec % 60;
      return { y, d, h, m, sec };
    }

    function updateCounter(data) {
      const start = new Date(data.startDate).getTime();
      const now = new Date();
      const diff = splitDiff(start, now);
      ui.years.textContent = diff.y;
      ui.days.textContent = diff.d;
      ui.hours.textContent = String(diff.h).padStart(2, '0');
      ui.minutes.textContent = String(diff.m).padStart(2, '0');
      ui.seconds.textContent = String(diff.sec).padStart(2, '0');

      const lifeDays = data.birthDate ? Math.floor((now - new Date(data.birthDate)) / 86400000) : null;
      ui.lifeDays.textContent = lifeDays !== null && lifeDays >= 0 ? `Ты живёшь: ${lifeDays} дней` : 'Ты живёшь: —';
    }

    function maybeDailyReminder(data) {
      const today = new Date().toISOString().slice(0,10);
      if (data.lastReminderDate === today) return data;

      const quote = getRandomQuote(data.habit);
      ui.dailyMsg.textContent = `${data.name}, ты большой молодец! Сегодня уже ${today}.`;
      ui.quote.textContent = `«${quote}»`;

      if ('Notification' in window) {
        if (Notification.permission === 'granted') {
          new Notification('FirstDay', { body: `${data.name}, ты большой молодец! ${quote}` });
        } else if (Notification.permission !== 'denied') {
          Notification.requestPermission();
        }
      }

      const updated = { ...data, lastReminderDate: today };
      saveData(updated);
      return updated;
    }



    async function fetchGeminiMotivation(data, signal) {
      const key = fields.apiKey.value.trim();
      if (!key) return null;

      const prompt = `Дай 1 короткую мотивационную цитату на русском (до 20 слов),
без эмодзи, обращенную к человеку по имени ${data.name},
который воздерживается от: ${data.habit}.`;

      const res = await fetch('https://api.kie.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`
        },
        body: JSON.stringify({
          model: 'gemini-2.5-pro',
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.7,
          max_tokens: 80
        }),
        signal
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const payload = await res.json();
      const content = payload?.choices?.[0]?.message?.content?.trim();
      return content || null;
    }

    async function applyMotivation(data) {
      ui.quote.textContent = `«${getRandomQuote(data.habit)}»`;
      const ctrl = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 8000);
      try {
        const aiQuote = await fetchGeminiMotivation(data, ctrl.signal);
        if (aiQuote) ui.quote.textContent = `«${aiQuote.replace(/^"|"$/g, '')}»`;
      } catch (_) {
      } finally {
        clearTimeout(timeout);
      }
    }

    function startTracking(data) {
      if (timerId) clearInterval(timerId);
      const withReminder = maybeDailyReminder(data);
      ui.greeting.textContent = `${withReminder.name}, ты выбрал(а) путь без «${withReminder.habit}». Держись!`;
      applyMotivation(withReminder);
      updateCounter(withReminder);
      timerId = setInterval(() => updateCounter(withReminder), 1000);
    }

    document.getElementById('testAiBtn').addEventListener('click', async () => {
      if (!fields.apiKey.value.trim()) {
        alert('Сначала вставь API ключ Kie.ai.');
        return;
      }
      const probe = { name: fields.name.value.trim() || 'Друг', habit: fields.habit.value || 'Алкоголь' };
      ui.quote.textContent = 'Проверка подключения к Gemini...';
      await applyMotivation(probe);
      alert('Подключение проверено: цитата обновлена.');
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      if (!fields.name.value.trim() || !fields.startDate.value) {
        alert('Пожалуйста, укажи имя и дату начала.');
        return;
      }
      localStorage.setItem(AI_KEY_STORAGE, fields.apiKey.value.trim());
      const data = {
        name: fields.name.value.trim(),
        birthDate: fields.birthDate.value || null,
        habit: fields.habit.value,
        startDate: new Date(fields.startDate.value).toISOString(),
        lastReminderDate: null
      };
      saveData(data);
      startTracking(data);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      const saved = getSaved();
      fields.apiKey.value = localStorage.getItem(AI_KEY_STORAGE) || '';
      if (!saved) return;
      const resetData = { ...saved, startDate: new Date().toISOString(), lastReminderDate: null };
      saveData(resetData);
      startTracking(resetData);
    });

    function load() {
      setDefaultStartDate();
      const saved = getSaved();
      fields.apiKey.value = localStorage.getItem(AI_KEY_STORAGE) || '';
      if (!saved) return;
      fields.name.value = saved.name || '';
      fields.birthDate.value = saved.birthDate || '';
      fields.habit.value = saved.habit || 'Алкоголь';
      const sd = new Date(saved.startDate);
      sd.setMinutes(sd.getMinutes() - sd.getTimezoneOffset());
      fields.startDate.value = sd.toISOString().slice(0,16);
      fields.apiKey.value = localStorage.getItem(AI_KEY_STORAGE) || '';
      startTracking(saved);
    }

    load();
  </script>
</body>
</html>
